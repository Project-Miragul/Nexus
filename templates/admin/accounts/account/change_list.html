{% extends "admin/change_list.html" %}

{% block object-tools-items %}
  <li>
    <a href="{{ suspended_dashboard_url }}" class="button"
       style="background:{% if suspended_count %}#8B4500{% else %}#417690{% endif %}; color:#fff; padding:5px 12px; border-radius:4px; font-weight:bold;">
      {% if suspended_count %}
        {{ suspended_count }} Suspended Account{{ suspended_count|pluralize }}
      {% else %}
        Suspended Accounts
      {% endif %}
    </a>
  </li>
  <li>
    <a href="{{ record_counts_url }}" class="button"
       style="background:#417690; color:#fff; padding:5px 12px; border-radius:4px; font-weight:bold;">
      Record Counts
    </a>
  </li>
  {{ block.super }}
{% endblock %}
